<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchFlow | تولید لایه‌بندی و ورک‌فلو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&amp;display=swap');
        body { font-family: 'Vazirmatn', system-ui, sans-serif; }
        .layer-card { transition: all 0.3s ease; }
        .layer-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">
    <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-violet-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-sitemap text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">ArchFlow</h1>
                    <p class="text-xs text-zinc-500 -mt-1">تولید لایه‌بندی و ورک‌فلو</p>
                </div>
            </div>
            <div class="flex items-center gap-x-2">
                <button onclick="toggleDarkMode()" class="px-4 py-2 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center gap-x-2 text-sm">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
                <div class="text-right text-sm">
                    <div class="font-semibold">Hamed Farifteh</div>
                    <div class="text-[10px] text-zinc-500">Developer</div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-10">
        <div class="text-center mb-10">
            <h2 class="text-5xl font-bold tracking-tighter mb-3">ایده‌ات رو بده،<br>معماریش رو بگیر</h2>
            <p class="text-xl text-zinc-600 dark:text-zinc-400">لایه‌بندی حرفه‌ای + ورک‌فلو بصری</p>
        </div>

        <!-- Input Form -->
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-8 mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="lg:col-span-2">
                    <label class="block text-sm font-medium mb-2">عنوان ایده نرم‌افزار</label>
                    <input id="idea-title" type="text" value="اپلیکیشن مدیریت پروژه تیمی" class="w-full px-5 py-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950 text-lg">
                </div>
                <div class="lg:col-span-2">
                    <label class="block text-sm font-medium mb-2">توضیح کوتاه</label>
                    <textarea id="idea-desc" rows="2" class="w-full px-5 py-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950">کاربران بتونن پروژه تعریف کنن، تسک-assign کنن و پیشرفت رو ببینن</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">پلتفرم هدف</label>
                    <select id="platform" class="w-full px-5 py-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950">
                        <option value="web">وب (Web App)</option>
                        <option value="mobile">موبایل</option>
                        <option value="cross">چند پلتفرمی</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">ویژگی‌های کلیدی (با ویرگول جدا کن)</label>
                    <input id="features" type="text" value="تعریف پروژه, تخصیص تسک, گزارش پیشرفت, چت تیمی" class="w-full px-5 py-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950">
                </div>
            </div>

            <button onclick="generateArchitecture()" class="mt-8 w-full py-4 bg-violet-600 hover:bg-violet-700 text-white text-lg font-semibold rounded-3xl flex items-center justify-center gap-x-3">
                <i class="fa-solid fa-magic"></i>
                <span>تولید لایه‌بندی و ورک‌فلو</span>
            </button>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <!-- Layers -->
            <div class="mb-10">
                <h3 class="text-2xl font-bold mb-6 flex items-center gap-x-3">
                    <i class="fa-solid fa-layer-group text-violet-500"></i> لایه‌بندی معماری
                </h3>
                <div id="layers-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>

            <!-- Workflow -->
            <div class="mb-10">
                <h3 class="text-2xl font-bold mb-6 flex items-center gap-x-3">
                    <i class="fa-solid fa-project-diagram text-violet-500"></i> ورک‌فلو اصلی کاربر
                </h3>
                <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-8">
                    <div id="mermaid-diagram" class="mermaid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initTailwind() {
            document.documentElement.classList.add('dark');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        function generateArchitecture() {
            const title = document.getElementById('idea-title').value.trim();
            const desc = document.getElementById('idea-desc').value.trim();
            const platform = document.getElementById('platform').value;
            const features = document.getElementById('features').value.split(',').map(f => f.trim());

            if (!title) {
                alert('لطفاً عنوان ایده را وارد کنید');
                return;
            }

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

            // Generate Layers
            generateLayers(platform);

            // Generate Mermaid Workflow
            generateWorkflow(title, features);
        }

        function generateLayers(platform) {
            const container = document.getElementById('layers-container');
            container.innerHTML = '';

            const layers = [
                { name: 'Frontend Layer', desc: 'رابط کاربری و نمایش داده‌ها', icon: 'fa-desktop', color: 'violet' },
                { name: 'Business Logic Layer', desc: 'منطق اصلی و پردازش داده‌ها', icon: 'fa-cogs', color: 'indigo' },
                { name: 'Data Layer', desc: 'مدیریت داده‌ها و ارتباط با دیتابیس', icon: 'fa-database', color: 'emerald' }
            ];

            if (platform === 'mobile' || platform === 'cross') {
                layers.push({ name: 'Mobile / Native Layer', desc: 'مدیریت ویژگی‌های خاص موبایل', icon: 'fa-mobile-alt', color: 'amber' });
            }

            layers.forEach(layer => {
                const div = document.createElement('div');
                div.className = `layer-card bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-3xl p-6`;
                div.innerHTML = `
                    <div class="flex items-center gap-x-4 mb-4">
                        <div class="w-12 h-12 bg-${layer.color}-100 dark:bg-${layer.color}-900/30 text-${layer.color}-600 dark:text-${layer.color}-400 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid ${layer.icon} text-2xl"></i>
                        </div>
                        <div class="font-bold text-xl">${layer.name}</div>
                    </div>
                    <p class="text-sm text-zinc-600 dark:text-zinc-400">${layer.desc}</p>
                `;
                container.appendChild(div);
            });
        }

        function generateWorkflow(title, features) {
            const container = document.getElementById('mermaid-diagram');
            
            let mermaidCode = `graph TD
                A[شروع کاربر] --> B[ورود به سیستم]
                B --> C[نمایش داشبورد]
                C --> D[ایجاد / انتخاب پروژه]
                D --> E[مدیریت تسک‌ها]
                E --> F[گزارش‌گیری و پیگیری]
                F --> G[پایان]`;

            container.innerHTML = mermaidCode;
            mermaid.initialize({ startOnLoad: false });
            mermaid.run();
        }

        function init() {
            initTailwind();
            mermaid.initialize({ startOnLoad: true });
        }

        window.onload = init;
    </script>
</body>
</html>
